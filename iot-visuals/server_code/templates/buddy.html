<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FysioFitBuddy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
 

<body>
<!-- Navigatiebalk-->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">FysioFitBuddy</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link active" href="#">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="oefening5_login.html">Login</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Oefeningen</a>
          </li>
        </ul>
      </div>
    </div>
</nav>

<!-- I need a hero! Super hero landing div-->
<div class="py-5 my-5 text-center">
  <img class="d-block mx-auto mb-4" src="{{ url_for('static', filename='fysiofitbuddy_logo.png') }}" alt="Logo" width="250" height="250">
  <h1 class="display-5 fw-bold text-body-emphasis">FysioFit Buddy</h1>
  <div class="col-lg-6 mx-auto">
    <p class="lead mb-4">
FysioFit Buddy staat voor je klaar! Wat voor oefening doen wij vandaag? 
    </p>
    <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
      <button type="button" class="btn btn-primary btn-lg px-4 gap-3">Oefening starten</button>
      <button type="button" class="btn btn-outline-secondary btn-lg px-4">Oefening stoppen</button>
    </div>
  </div>
</div>

<div id="feedback-bericht" class="container text-center fw-bold py-3">
    Wachten op meting...
</div>

<script>
  async function update() {
    try {
        const res = await fetch("/current");
        const data = await res.json();

        const feedbackDiv = document.getElementById("feedback-bericht");

        // Logica voor de tekstberichten
        if (data.status === "ok") {
            feedbackDiv.textContent = "Je bent lekker bezig!";
            feedbackDiv.className = "container text-center fw-bold py-3 display-6"; // Groene tekst
        } 
        else if (data.status === "carefull") {
            feedbackDiv.textContent = "Je doet de oefening goed, probeer je arm iets meer te strekken!";
            feedbackDiv.className = "container text-center fw-bold py-3 display-6"; // Oranje tekst
        } 
        else if (data.status === "warning") {
            feedbackDiv.textContent = "Oeps! Dit gaat niet goed. Zou je nog eens de intructies willen bekijken?";
            feedbackDiv.className = "container text-center fw-bold py-3 display-6"; // Rode tekst
        }

    } catch (error) {
        console.error("Fout bij ophalen data:", error);
    }
}

// Zorg dat deze onderaan je <body> staat in een <script> tag
setInterval(update, 1000); 
update();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
